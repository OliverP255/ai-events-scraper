# Run all scrapers against Postgres (upsert only — no table truncate).
# Set repository secret DATABASE_URL to your Neon (or other) connection string.

name: Daily scrape

on:
  schedule:
    # 06:00 UTC daily — change cron as needed
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify DATABASE_URL
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "::error::DATABASE_URL secret is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Run scrapers
        run: python -m ai_events run
