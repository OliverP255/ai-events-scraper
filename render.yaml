# Blueprint: https://render.com/docs/blueprint-spec
# After push, use Dashboard → New → Blueprint, or run create_web_service via Render MCP.
services:
  - type: web
    name: ai-events-web
    runtime: python
    region: frankfurt
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn ai_events.webapp.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
