<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/static/calendar-xoaigr9z259n0zw0pl1c.webp" type="image/webp">
  <title>Enterprise AI events · London</title>
  <style>
    :root {
      --bg: #000000;
      --surface: #0a0a0a;
      --elevated: #111111;
      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.14);
      --text: #f5f5f5;
      --muted: #737373;
      --faint: #404040;
      --warn: #fbbf24;
      --radius: 10px;
      --font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --mono: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid var(--faint);
      transition: color 0.15s ease, border-color 0.15s ease;
    }

    a:hover { color: #fafafa; border-bottom-color: #fafafa; }

    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
    }

    /* Calendar uses more horizontal space so month cells stay readable. */
    body.mode-calendar .wrap {
      max-width: min(1320px, 100%);
      padding-left: clamp(1rem, 3vw, 2.25rem);
      padding-right: clamp(1rem, 3vw, 2.25rem);
    }

    header {
      margin-bottom: 1.25rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 0.75rem;
      font-weight: 600;
    }

    h1 {
      font-size: clamp(1.65rem, 4vw, 2.1rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      margin: 0 0 0.5rem;
      line-height: 1.15;
    }

    .sub { color: var(--muted); font-size: 0.95rem; max-width: 38rem; margin: 0; }

    .tabs {
      display: flex;
      gap: 0.35rem;
      margin-bottom: 1.5rem;
      padding: 0.2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      width: fit-content;
      max-width: 100%;
    }

    .tabs button {
      appearance: none;
      font: inherit;
      color: var(--muted);
      background: transparent;
      border: none;
      padding: 0.45rem 1.1rem;
      border-radius: 999px;
      cursor: pointer;
      transition: color 0.15s ease, background 0.15s ease;
    }

    .tabs button[aria-selected="true"] {
      color: var(--text);
      background: var(--elevated);
      box-shadow: 0 0 0 1px var(--border-strong);
    }

    .tabs button:focus-visible {
      outline: 2px solid var(--border-strong);
      outline-offset: 2px;
    }

    .banner {
      background: var(--surface);
      border: 1px solid var(--border-strong);
      color: var(--warn);
      padding: 0.75rem 1rem;
      border-radius: var(--radius);
      font-size: 0.88rem;
      margin-bottom: 1.5rem;
    }

    .toolbar {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      margin-bottom: 1.35rem;
    }

    .toolbar-search-row {
      width: 100%;
    }

    .toolbar-search-row .search {
      width: 100%;
      min-width: 0;
    }

    .toolbar-search-row .search input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.7rem 1rem;
      border-radius: var(--radius);
      font: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .toolbar-search-row .search input:focus {
      border-color: var(--border-strong);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.06);
    }

    .toolbar-search-row .search input::placeholder {
      color: var(--faint);
    }

    /* Source + From + To on one horizontal line; scroll horizontally on very narrow viewports */
    .toolbar-filter-row {
      display: flex;
      flex-wrap: nowrap;
      align-items: flex-end;
      gap: 1rem;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 0.15rem;
    }

    .filter-field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      min-width: 0;
      flex: 0 0 auto;
    }

    .filter-field > label {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
    }

    .filter-source-group {
      flex: 0 0 auto;
    }

    .filter-source-group select {
      width: auto;
      min-width: 10.5rem;
      max-width: 16rem;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.55rem 0.85rem;
      border-radius: var(--radius);
      font: inherit;
      cursor: pointer;
      transition: border-color 0.15s ease;
    }

    .filter-source-group select:focus {
      outline: none;
      border-color: var(--border-strong);
    }

    .toolbar-dates {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      align-items: flex-end;
      gap: 1rem;
      flex: 0 0 auto;
    }

    .toolbar-dates .filter-field input[type="date"] {
      width: 10.75rem;
      max-width: none;
      box-sizing: border-box;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.55rem 0.65rem;
      border-radius: var(--radius);
      font: inherit;
      font-variant-numeric: tabular-nums;
      outline: none;
      transition: border-color 0.15s ease;
    }

    .toolbar-dates .filter-field input[type="date"]:focus {
      border-color: var(--border-strong);
    }

    body.mode-calendar .search-only { display: none !important; }

    @media (min-width: 640px) {
      .toolbar-dates.search-only {
        padding-left: 1.25rem;
        margin-left: 0.15rem;
        border-left: 1px solid var(--border);
      }
    }

    .toolbar-end {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.85rem;
      flex: 0 0 auto;
      margin-left: auto;
      padding-bottom: 0.15rem;
    }

    .btn-export {
      appearance: none;
      font: inherit;
      font-size: 0.8rem;
      color: var(--muted);
      background: transparent;
      border: 1px solid var(--border);
      padding: 0.45rem 0.75rem;
      border-radius: var(--radius);
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .btn-export:hover {
      color: var(--text);
      border-color: var(--border-strong);
      background: var(--elevated);
    }

    .btn-export:focus-visible {
      outline: 2px solid var(--border-strong);
      outline-offset: 2px;
    }

    .toolbar-end .meta {
      margin-left: 0;
    }

    .cal-nav {
      display: none;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    body.mode-calendar .cal-nav { display: flex; }

    .cal-nav h2 {
      font-size: clamp(1.15rem, 2.2vw, 1.4rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0 0.85rem 0 0;
      min-width: 11rem;
    }

    .cal-nav button.icon {
      width: 2.5rem;
      height: 2.5rem;
      padding: 0;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      transition: border-color 0.15s ease, background 0.15s ease;
    }

    .cal-nav button.icon:hover {
      border-color: var(--border-strong);
      background: var(--elevated);
    }

    .cal-nav button.ghost {
      font: inherit;
      padding: 0.45rem 0.75rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
    }

    .cal-nav button.ghost:hover {
      color: var(--text);
      border-color: var(--border-strong);
    }

    .meta {
      font-size: 0.8rem;
      color: var(--muted);
      margin-left: auto;
    }

    body.mode-calendar .meta-search { display: none; }
    body.mode-search .meta-cal { display: none; }

    .state { text-align: center; padding: 3rem 1rem; color: var(--muted); }
    .state.err { color: #fca5a5; }

    ul.events {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .card {
      background: linear-gradient(145deg, var(--elevated) 0%, var(--surface) 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.2rem 1.15rem;
      transition: border-color 0.2s ease, transform 0.2s ease;
    }

    .card:hover {
      border-color: var(--border-strong);
      transform: translateY(-1px);
    }

    .card.card-pinned {
      border-color: rgba(176, 140, 72, 0.65);
      box-shadow: 0 0 0 1px rgba(184, 148, 88, 0.35);
    }

    .card.card-pinned:hover {
      border-color: rgba(196, 162, 96, 0.8);
      box-shadow: 0 0 0 1px rgba(196, 162, 96, 0.45);
    }

    .card-top {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 0.45rem;
    }

    .card h2 {
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0;
      flex: 1 1 auto;
      min-width: 0;
    }

    .card h2 a { border-bottom: none; }
    .card h2 a:hover { text-decoration: underline; text-underline-offset: 3px; }

    .badge {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 0.2rem 0.45rem;
      border-radius: 4px;
      white-space: nowrap;
    }

    .badge.badge-pinned {
      color: #d4c4a0;
      border: 1px solid rgba(176, 140, 72, 0.75);
      box-shadow: 0 0 0 1px rgba(184, 148, 88, 0.28);
      letter-spacing: 0.1em;
    }

    .when {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--muted);
      margin: 0 0 0.35rem;
    }

    .loc { font-size: 0.85rem; color: var(--muted); margin: 0 0 0.6rem; }

    .desc {
      font-size: 0.88rem;
      color: #a3a3a3;
      margin: 0;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Single 7-column grid: headers + days share column tracks (avoids misaligned rows). */
    .cal-wrap {
      display: none;
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) + 2px);
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      background: var(--surface);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
    }

    body.mode-calendar .cal-wrap { display: block; }

    .cal-sheet {
      display: grid;
      /* Taller minimum column width so days stay legible; scrolls horizontally on small screens. */
      grid-template-columns: repeat(7, minmax(6.75rem, 1fr));
      width: 100%;
      min-width: 49rem;
      gap: 0;
    }

    .cal-head {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0.65rem 0.45rem;
      text-align: center;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .cal-cell {
      min-height: 8.5rem;
      min-width: 0;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 0.5rem 0.5rem 0.55rem;
      background: var(--surface);
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .cal-sheet > *:nth-child(7n) { border-right: none; }

    .cal-cell:hover { background: var(--elevated); }

    .cal-cell.other { opacity: 0.45; }

    .cal-cell.today {
      box-shadow: inset 0 0 0 1px var(--border-strong);
    }

    .cal-daynum {
      font-family: var(--mono);
      font-size: 0.84rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    .cal-cell.today .cal-daynum { color: var(--text); }

    .cal-pill {
      display: block;
      font-size: 0.74rem;
      line-height: 1.3;
      padding: 0.22rem 0.4rem;
      margin-bottom: 0.2rem;
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid var(--border);
      color: #e5e5e5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cal-pill.cal-pill-pinned {
      border-color: rgba(176, 140, 72, 0.7);
      box-shadow: none;
      background: rgba(148, 118, 64, 0.14);
      color: #e8dcc8;
    }

    .cal-pill-pin-label {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #d4c4a0;
      border: 1px solid rgba(176, 140, 72, 0.75);
      box-shadow: 0 0 0 1px rgba(184, 148, 88, 0.28);
      border-radius: 3px;
      padding: 0.05rem 0.22rem;
      margin-right: 0.3rem;
      vertical-align: 0.05em;
    }

    .cal-more {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 0.15rem;
      letter-spacing: 0.02em;
    }

    .undated {
      display: none;
      margin-top: 1.25rem;
      padding: 1rem 1.1rem;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    body.mode-calendar .undated.has-items { display: block; }

    .undated h3 {
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 0.65rem;
      font-weight: 600;
    }

    /* Modal */
    .backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      z-index: 40;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .backdrop.open { display: flex; }

    .modal {
      width: 100%;
      max-width: 420px;
      max-height: 85vh;
      overflow: auto;
      background: var(--elevated);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      padding: 1.1rem 1.2rem 1.2rem;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.55);
    }

    .modal header {
      border: none;
      padding: 0;
      margin: 0 0 0.75rem;
    }

    .modal h2 {
      font-size: 1rem;
      margin: 0;
      font-weight: 600;
    }

    .modal .close {
      float: right;
      appearance: none;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 1.25rem;
      line-height: 1;
      cursor: pointer;
      padding: 0.1rem 0.25rem;
    }

    .modal .close:hover { color: var(--text); }

    .modal ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .modal li {
      padding: 0.55rem 0;
      border-bottom: 1px solid var(--border);
    }

    .modal li.modal-li-pinned {
      margin: 0 -0.35rem;
      padding-left: 0.35rem;
      padding-right: 0.35rem;
      border-radius: 6px;
      border: 1px solid rgba(176, 140, 72, 0.55);
      box-shadow: 0 0 0 1px rgba(184, 148, 88, 0.22);
      border-bottom: 1px solid rgba(176, 140, 72, 0.45);
    }

    .modal li:last-child { border-bottom: none; }

    .modal li a {
      font-weight: 500;
      border-bottom: none;
    }

    .modal li a:hover { text-decoration: underline; }

    .modal .mi-meta {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    .modal .badge-pinned-inline {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #d4c4a0;
      border: 1px solid rgba(176, 140, 72, 0.75);
      box-shadow: 0 0 0 1px rgba(184, 148, 88, 0.28);
      padding: 0.12rem 0.38rem;
      border-radius: 4px;
      margin-right: 0.45rem;
      vertical-align: 0.05em;
    }

    footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--faint);
    }

    body.mode-calendar #panel-search { display: none; }
    body.mode-search #panel-calendar { display: none; }
  </style>
</head>
<body class="mode-search">
  <div class="wrap">
    <header>
      <p class="eyebrow">Events</p>
      <h1>Enterprise AI Calendar · London</h1>
      <p class="sub">Search or browse by month. Filters apply to both views.</p>
    </header>

    <div class="tabs" role="tablist" aria-label="View">
      <button type="button" role="tab" id="tab-search" aria-selected="true" aria-controls="panel-search">Search</button>
      <button type="button" role="tab" id="tab-calendar" aria-selected="false" aria-controls="panel-calendar">Calendar</button>
    </div>

    <div class="banner" id="nodb" hidden>
      No event list is available yet. Once events are added, they will appear here.
    </div>

    <div class="toolbar" id="toolbar" hidden>
      <div class="toolbar-search-row">
        <div class="search">
          <input type="search" id="q" placeholder="Search events, venues, or topics…" autocomplete="off" aria-label="Search events">
        </div>
      </div>
      <div class="toolbar-filter-row">
        <div class="filter-field filter-source-group">
          <label for="src">Source</label>
          <select id="src" aria-label="Source filter">
            <option value="">All sources</option>
          </select>
        </div>
        <div class="toolbar-dates search-only" role="group" aria-label="Date range">
          <div class="filter-field">
            <label for="fromd">From</label>
            <input type="date" id="fromd">
          </div>
          <div class="filter-field">
            <label for="tod">To</label>
            <input type="date" id="tod">
          </div>
        </div>
        <div class="toolbar-end">
          <button type="button" class="btn-export search-only" id="btn-export-csv">Export CSV</button>
          <span class="meta meta-search" id="count"></span>
          <span class="meta meta-cal" id="cal-meta" aria-live="polite"></span>
        </div>
      </div>
    </div>

    <div class="cal-nav">
      <button type="button" class="icon" id="cal-prev" aria-label="Previous month">‹</button>
      <button type="button" class="icon" id="cal-next" aria-label="Next month">›</button>
      <h2 id="cal-title">—</h2>
      <button type="button" class="ghost" id="cal-today">Today</button>
    </div>

    <div class="state" id="loading">Loading…</div>
    <div class="state err" id="err" hidden></div>

    <div id="panel-search" role="tabpanel" aria-labelledby="tab-search">
      <ul class="events" id="list" hidden></ul>
    </div>

    <div id="panel-calendar" role="tabpanel" aria-labelledby="tab-calendar" hidden>
      <div class="cal-wrap">
        <div class="cal-sheet" id="cal-sheet" role="grid" aria-label="Month calendar"></div>
      </div>
      <div class="undated" id="undated">
        <h3>No date</h3>
        <ul class="events" id="undated-list"></ul>
      </div>
    </div>

    <div class="backdrop" id="day-backdrop" role="dialog" aria-modal="true" aria-labelledby="day-modal-title">
      <div class="modal">
        <button type="button" class="close" id="day-close" aria-label="Close">×</button>
        <header>
          <h2 id="day-modal-title">Events</h2>
        </header>
        <ul id="day-modal-list"></ul>
      </div>
    </div>

    <footer>In-person enterprise AI events in London.</footer>
  </div>

  <script>
    (function () {
      const $ = (id) => document.getElementById(id);

      (function stashApiFromQuery() {
        try {
          const raw = new URLSearchParams(window.location.search).get("api");
          if (raw) sessionStorage.setItem("ai_events_api_origin", new URL(raw).origin);
        } catch (_) {}
      })();

      const API_ORIGIN = (function () {
        const o = window.location.origin;
        if (o && /^https?:\/\//i.test(o)) return o.replace(/\/$/, "");
        const s =
          sessionStorage.getItem("ai_events_api_origin") || localStorage.getItem("ai_events_api_origin");
        if (s) return s.replace(/\/$/, "");
        return "http://127.0.0.1:8765";
      })();

      function apiUrl(path) {
        const p = path.startsWith("/") ? path : "/" + path;
        return API_ORIGIN + p;
      }

      function loadFailedMessage(e) {
        const msg = e && e.message ? e.message : String(e);
        if (msg === "Failed to fetch" || msg === "NetworkError when attempting to fetch resource.") {
          return "Couldn’t connect. Check your connection and try again.";
        }
        return "Couldn’t load events. Please try again.";
      }

      const TAB_KEY = "ai_events_tab";
      const CAL_KEY = "ai_events_cal";

      const fmtWhen = (iso) => {
        if (!iso) return "Date TBC";
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return iso;
        return new Intl.DateTimeFormat(undefined, {
          weekday: "short",
          year: "numeric",
          month: "short",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit",
        }).format(d);
      };

      const fmtTime = (iso) => {
        if (!iso) return "";
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return "";
        return new Intl.DateTimeFormat(undefined, { hour: "2-digit", minute: "2-digit" }).format(d);
      };

      const locLine = (row) => {
        const parts = [row.venue, row.city, row.country].filter(Boolean);
        return parts.length ? parts.join(" · ") : null;
      };

      function pad(n) {
        return n < 10 ? "0" + n : String(n);
      }

      function ymd(d) {
        return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate());
      }

      /** @type {{ y: number, m: number }} month view (m = 0–11) */
      let viewCal = { y: new Date().getFullYear(), m: new Date().getMonth() };

      try {
        const raw = sessionStorage.getItem(CAL_KEY);
        if (raw) {
          const j = JSON.parse(raw);
          if (typeof j.y === "number" && typeof j.m === "number" && j.m >= 0 && j.m <= 11) viewCal = j;
        }
      } catch (_) {}

      let debounce;

      function buildQuerySearch() {
        const p = new URLSearchParams();
        const q = $("q").value.trim();
        if (q) p.set("q", q);
        const src = $("src").value;
        if (src) p.set("source", src);
        if ($("fromd").value) p.set("from", $("fromd").value + "T00:00:00");
        if ($("tod").value) p.set("to", $("tod").value + "T23:59:59");
        p.set("limit", "100");
        p.set("offset", "0");
        return p.toString();
      }

      /** Same filters as search / API, without pagination (for CSV export). */
      function buildQueryExport() {
        const p = new URLSearchParams();
        const q = $("q").value.trim();
        if (q) p.set("q", q);
        const src = $("src").value;
        if (src) p.set("source", src);
        if ($("fromd").value) p.set("from", $("fromd").value + "T00:00:00");
        if ($("tod").value) p.set("to", $("tod").value + "T23:59:59");
        return p.toString();
      }

      async function exportSearchCsv() {
        try {
          const r = await fetch(apiUrl("/api/export?" + buildQueryExport()));
          if (!r.ok) throw new Error("export failed");
          const blob = await r.blob();
          const u = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = u;
          a.download = "events.csv";
          a.rel = "noopener";
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(u);
        } catch (_) {
          alert("Couldn’t download the file. Please try again.");
        }
      }

      function monthRange(y, m) {
        const first = new Date(y, m, 1);
        const toMon = (first.getDay() + 6) % 7;
        const gridStart = new Date(y, m, 1 - toMon, 12, 0, 0);
        const last = new Date(y, m + 1, 0);
        const dowL = last.getDay();
        const toSun = dowL === 0 ? 0 : 7 - dowL;
        const gridEnd = new Date(y, m + 1, 0);
        gridEnd.setDate(last.getDate() + toSun);
        gridEnd.setHours(12, 0, 0, 0);
        return { gridStart, gridEnd, first, last };
      }

      function buildQueryCalendar() {
        const p = new URLSearchParams();
        const q = $("q").value.trim();
        if (q) p.set("q", q);
        const src = $("src").value;
        if (src) p.set("source", src);
        const { gridStart, gridEnd } = monthRange(viewCal.y, viewCal.m);
        p.set("from", ymd(gridStart) + "T00:00:00");
        p.set("to", ymd(gridEnd) + "T23:59:59");
        p.set("limit", "500");
        p.set("offset", "0");
        return p.toString();
      }

      function bucketByDay(items) {
        const map = new Map();
        const undated = [];
        items.forEach((row) => {
          if (!row.starts_at) {
            undated.push(row);
            return;
          }
          const d = new Date(row.starts_at);
          if (Number.isNaN(d.getTime())) {
            undated.push(row);
            return;
          }
          const key = ymd(d);
          if (!map.has(key)) map.set(key, []);
          map.get(key).push(row);
        });
        map.forEach((arr) => arr.sort((a, b) => new Date(a.starts_at) - new Date(b.starts_at)));
        undated.sort((a, b) => (a.title || "").localeCompare(b.title || ""));
        return { map, undated };
      }

      function isToday(d) {
        const t = new Date();
        return d.getDate() === t.getDate() && d.getMonth() === t.getMonth() && d.getFullYear() === t.getFullYear();
      }

      function renderCalendar(items, total) {
        const { gridStart, gridEnd } = monthRange(viewCal.y, viewCal.m);
        const title = new Intl.DateTimeFormat(undefined, { month: "long", year: "numeric" }).format(
          new Date(viewCal.y, viewCal.m, 1)
        );
        $("cal-title").textContent = title;
        $("cal-meta").textContent = total + " event" + (total === 1 ? "" : "s") + " · " + title;

        const weekdays = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
        const sheet = $("cal-sheet");
        sheet.innerHTML = "";
        weekdays.forEach((w) => {
          const h = document.createElement("div");
          h.className = "cal-head";
          h.textContent = w;
          sheet.appendChild(h);
        });

        const { map, undated } = bucketByDay(items);

        const cur = new Date(gridStart);
        while (cur <= gridEnd) {
          const key = ymd(cur);
          const inMonth = cur.getMonth() === viewCal.m;
          const cell = document.createElement("div");
          cell.className = "cal-cell";
          if (!inMonth) cell.classList.add("other");
          if (isToday(cur)) cell.classList.add("today");
          cell.dataset.day = key;

          const num = document.createElement("div");
          num.className = "cal-daynum";
          num.textContent = cur.getDate();
          cell.appendChild(num);

          const evs = map.get(key) || [];
          const maxShow = 3;
          evs.slice(0, maxShow).forEach((row) => {
            const pill = document.createElement("span");
            pill.className = "cal-pill" + (row.pinned ? " cal-pill-pinned" : "");
            const t = fmtTime(row.starts_at);
            if (row.pinned) {
              const pin = document.createElement("span");
              pin.className = "cal-pill-pin-label";
              pin.textContent = "PINNED";
              pill.appendChild(pin);
            }
            pill.appendChild(
              document.createTextNode((t ? t + " · " : "") + (row.title || "(untitled)"))
            );
            pill.title = row.title || "";
            cell.appendChild(pill);
          });
          if (evs.length > maxShow) {
            const more = document.createElement("div");
            more.className = "cal-more";
            more.textContent = "+" + (evs.length - maxShow) + " more";
            cell.appendChild(more);
          }

          cell.addEventListener("click", () => openDayModal(key, evs));
          sheet.appendChild(cell);

          cur.setDate(cur.getDate() + 1);
        }

        const u = $("undated");
        const ul = $("undated-list");
        ul.innerHTML = "";
        if (undated.length) {
          u.classList.add("has-items");
          undated.forEach((row) => {
            ul.appendChild(renderCard(row));
          });
        } else {
          u.classList.remove("has-items");
        }
      }

      function renderCard(row) {
        const li = document.createElement("li");
        li.className = "card" + (row.pinned ? " card-pinned" : "");
        const top = document.createElement("div");
        top.className = "card-top";
        const h2 = document.createElement("h2");
        const a = document.createElement("a");
        a.href = row.url;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.textContent = row.title || "(untitled)";
        h2.appendChild(a);
        const badge = document.createElement("span");
        if (row.pinned) {
          badge.className = "badge badge-pinned";
          badge.textContent = "PINNED";
        } else {
          badge.className = "badge";
          badge.textContent = row.source || "—";
        }
        top.appendChild(h2);
        top.appendChild(badge);
        li.appendChild(top);
        const when = document.createElement("p");
        when.className = "when";
        when.textContent = fmtWhen(row.starts_at);
        li.appendChild(when);
        const loc = locLine(row);
        if (loc) {
          const p = document.createElement("p");
          p.className = "loc";
          p.textContent = loc;
          li.appendChild(p);
        }
        if (row.description) {
          const d = document.createElement("p");
          d.className = "desc";
          d.textContent = row.description.replace(/\s+/g, " ").trim();
          li.appendChild(d);
        }
        return li;
      }

      function renderList(items) {
        const list = $("list");
        list.innerHTML = "";
        items.forEach((row) => list.appendChild(renderCard(row)));
      }

      function openDayModal(dayKey, evs) {
        if (!evs || !evs.length) return;
        $("day-modal-title").textContent = dayKey;
        const ul = $("day-modal-list");
        ul.innerHTML = "";
        evs.forEach((row) => {
          const li = document.createElement("li");
          if (row.pinned) li.classList.add("modal-li-pinned");
          if (row.pinned) {
            const pin = document.createElement("span");
            pin.className = "badge-pinned-inline";
            pin.textContent = "PINNED";
            li.appendChild(pin);
          }
          const a = document.createElement("a");
          a.href = row.url;
          a.target = "_blank";
          a.rel = "noopener noreferrer";
          a.textContent = row.title || "(untitled)";
          li.appendChild(a);
          const meta = document.createElement("div");
          meta.className = "mi-meta";
          meta.textContent = [fmtTime(row.starts_at), row.source].filter(Boolean).join(" · ");
          li.appendChild(meta);
          ul.appendChild(li);
        });
        $("day-backdrop").classList.add("open");
      }

      function closeDayModal() {
        $("day-backdrop").classList.remove("open");
      }

      async function loadSearch() {
        $("loading").hidden = false;
        $("err").hidden = true;
        try {
          const qs = buildQuerySearch();
          const r = await fetch(apiUrl("/api/events?" + qs));
          if (!r.ok) throw new Error("load failed");
          const data = await r.json();
          $("loading").hidden = true;
          $("toolbar").hidden = false;
          $("list").hidden = false;
          $("nodb").hidden = data.database_available;
          $("count").textContent = data.total + " event" + (data.total === 1 ? "" : "s");
          renderList(data.items || []);
        } catch (e) {
          $("loading").hidden = true;
          $("err").hidden = false;
          $("err").textContent = loadFailedMessage(e);
        }
      }

      async function loadCalendar() {
        $("loading").hidden = false;
        $("err").hidden = true;
        try {
          const qs = buildQueryCalendar();
          const r = await fetch(apiUrl("/api/events?" + qs));
          if (!r.ok) throw new Error("load failed");
          const data = await r.json();
          $("loading").hidden = true;
          $("toolbar").hidden = false;
          $("panel-calendar").hidden = false;
          $("nodb").hidden = data.database_available;
          renderCalendar(data.items || [], data.total ?? 0);
        } catch (e) {
          $("loading").hidden = true;
          $("err").hidden = false;
          $("err").textContent = loadFailedMessage(e);
        }
      }

      function scheduleSearch() {
        clearTimeout(debounce);
        debounce = setTimeout(() => {
          if (document.body.classList.contains("mode-search")) loadSearch();
          else loadCalendar();
        }, 320);
      }

      function setTab(search) {
        const isSearch = !!search;
        document.body.classList.toggle("mode-search", isSearch);
        document.body.classList.toggle("mode-calendar", !isSearch);
        $("tab-search").setAttribute("aria-selected", isSearch ? "true" : "false");
        $("tab-calendar").setAttribute("aria-selected", isSearch ? "false" : "true");
        $("panel-search").hidden = !isSearch;
        $("panel-calendar").hidden = isSearch;
        sessionStorage.setItem(TAB_KEY, isSearch ? "search" : "calendar");
        if (isSearch) loadSearch();
        else loadCalendar();
      }

      $("tab-search").addEventListener("click", () => setTab(true));
      $("tab-calendar").addEventListener("click", () => setTab(false));

      $("cal-prev").addEventListener("click", () => {
        viewCal.m -= 1;
        if (viewCal.m < 0) {
          viewCal.m = 11;
          viewCal.y -= 1;
        }
        sessionStorage.setItem(CAL_KEY, JSON.stringify(viewCal));
        loadCalendar();
      });

      $("cal-next").addEventListener("click", () => {
        viewCal.m += 1;
        if (viewCal.m > 11) {
          viewCal.m = 0;
          viewCal.y += 1;
        }
        sessionStorage.setItem(CAL_KEY, JSON.stringify(viewCal));
        loadCalendar();
      });

      $("cal-today").addEventListener("click", () => {
        const t = new Date();
        viewCal = { y: t.getFullYear(), m: t.getMonth() };
        sessionStorage.setItem(CAL_KEY, JSON.stringify(viewCal));
        loadCalendar();
      });

      $("day-close").addEventListener("click", closeDayModal);
      $("day-backdrop").addEventListener("click", (e) => {
        if (e.target === $("day-backdrop")) closeDayModal();
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeDayModal();
      });

      fetch(apiUrl("/api/meta"))
        .then((r) => (r.ok ? r.json() : { sources: [] }))
        .then((meta) => {
          const sel = $("src");
          (meta.sources || []).forEach((s) => {
            const o = document.createElement("option");
            o.value = s;
            o.textContent = s;
            sel.appendChild(o);
          });
        })
        .catch(() => {});

      ["q", "src", "fromd", "tod"].forEach((id) => {
        $(id).addEventListener("input", scheduleSearch);
        $(id).addEventListener("change", scheduleSearch);
      });

      $("btn-export-csv").addEventListener("click", () => exportSearchCsv());

      const initialTab = sessionStorage.getItem(TAB_KEY) === "calendar" ? "calendar" : "search";
      if (initialTab === "calendar") {
        setTab(false);
      } else {
        setTab(true);
      }
    })();
  </script>
</body>
</html>
